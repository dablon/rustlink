name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload binary (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: rustlink-linux
          path: target/release/rustlink

  # ============ APT (.deb) Package ============
  deb-package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustlink-linux
          path: .

      - name: Make executable
        run: chmod +x rustlink

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb

      - name: Upload .deb to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ RPM (.rpm) Package ============
  rpm-package:
    needs: build
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustlink-linux
          path: .

      - name: Make executable
        run: chmod +x rustlink

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"

      - name: Install cargo-rpm
        run: |
          source "$HOME/.cargo/env"
          cargo install cargo-rpm

      - name: Build rpm package
        run: |
          source "$HOME/.cargo/env"
          cargo rpm build

      - name: Find rpm file
        id: find-rpm
        run: |
          RPM_FILE=$(find target -name "*.rpm" | head -1)
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT

      - name: Upload .rpm to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-rpm.outputs.rpm_file }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ Chocolatey Package ============
  choco-package:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustlink-linux
          path: .
          merge-multiple: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build for Windows
        run: cargo build --release

      - name: Create Chocolatey package
        run: pwsh -File .github/scripts/create-choco.ps1

      - name: Upload .nupkg to Release
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: rustlink-choco
          path: rustlink*.nupkg

  # ============ Release ============
  release:
    needs: [deb-package, rpm-package, choco-package]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old tag if exists
        run: |
          git tag -d v${{ env.VERSION }} 2>/dev/null || true
          git push origin :refs/tags/v${{ env.VERSION }} 2>/dev/null || true

      - name: Create tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
