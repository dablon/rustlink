name: CI

permissions:
  contents: write
  actions: write
  pull-requests: write

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        timeout-minutes: 30

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        timeout-minutes: 30

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        timeout-minutes: 30

      - name: Build release
        run: cargo build --release

      - name: Upload binary (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: rustlink-linux
          path: target/release/rustlink

  # ============ APT (.deb) Package ============
  deb-package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustlink-linux
          path: .

      - name: Make executable
        run: chmod +x rustlink

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: rustlink-deb
          path: target/debian/*.deb

  # ============ Chocolatey Package ============
  choco-package:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: rustlink-linux
          path: .
          merge-multiple: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        timeout-minutes: 30

      - name: Build for Windows
        run: cargo build --release

      - name: Create Chocolatey package
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          pwsh -File .github/scripts/create-choco.ps1

      - name: Upload .nupkg
        uses: actions/upload-artifact@v4
        with:
          name: rustlink-choco
          path: rustlink*.nupkg

  # ============ Release ============
  release:
    needs: [build, deb-package, choco-package]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rustlink-*
          merge-multiple: true

      - name: Get version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old tag if exists
        run: |
          git tag -d v${{ env.VERSION }} 2>/dev/null || true
          git push origin :refs/tags/v${{ env.VERSION }} 2>/dev/null || true

      - name: Create tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ Publish to Cloudsmith (Public APT) ============
  publish-apt:
    needs: deb-package
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: rustlink-deb
          path: .

      - name: Upload to Cloudsmith
        uses: cloudsmith/cloudsmith-action@v1
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          repo: 'nicolas-alcaraz/rustlink'
          format: 'deb'
          distribution: 'any'
          source: './rustlink*.deb'
